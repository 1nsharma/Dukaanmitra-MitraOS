<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>DukaanMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",

    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",

<style>
  :root {
    --app-height: 100%;
  }
  html, body {
    height: 100dvh;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  body {
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
    display: flex;
    flex-direction: column;
  }
  #root {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .safe-bottom {
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  /* Advanced Multi-Device Resizer Frame */
  .device-frame {
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    background: #020617;
    position: relative;
    border: 12px solid #0f172a;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5), 0 0 40px rgba(79,70,229,0.1);
  }

  .device-frame.mode-mobile {
    aspect-ratio: 9 / 19.5;
    width: 100%;
    max-width: 380px;
    border-radius: 4rem;
  }

  .device-frame.mode-tablet {
    aspect-ratio: 3 / 4;
    width: 100%;
    max-width: 768px;
    border-radius: 2.5rem;
    border-width: 20px;
  }

  .device-frame.mode-desktop {
    aspect-ratio: 16 / 9;
    width: 100%;
    max-width: 1200px;
    border-radius: 1.5rem;
    border-width: 10px;
  }

  .device-content {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7de;
    display: flex;
    flex-direction: column;
    transition: border-radius 0.5s ease;
  }

  .mode-mobile .device-content { border-radius: 3.2rem; }
  .mode-tablet .device-content { border-radius: 1.5rem; }
  .mode-desktop .device-content { border-radius: 0.8rem; }

  @media (max-width: 1024px) {
    .device-frame.mode-mobile { max-height: 70vh; }
    .device-frame.mode-tablet { max-height: 60vh; }
    .device-frame.mode-desktop { max-height: 50vh; }
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
